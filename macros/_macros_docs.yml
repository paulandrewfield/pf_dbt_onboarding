macros:
  - name: cents_to_dollars
    description: A macro that converts cents to dollars by dividing by 100 and rounds to user defined decimal places. Rounds to 2 if not provided
    arguments:
      - name: column_name
        type: string
        description: The name of the column you want to convert
      - name: decimals
        type: integer
        description: How many decimal places to round to. Default 2 if not provided
  - name: grant_select
    description: A macro that grants select privs on target.schema to target.role unless otherwise specified.
    arguments:
      - name: schema
        type: string
        description: schema we want to grant privs on. target.schema by default
      - name: role
        type: string
        description: role we want to grant privs to. target.role by default
