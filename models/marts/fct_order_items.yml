version: 2

models:
  - name: fct_order_items
    columns:
      - name: line_quantity_ordered
        tests:
          - not_null
          - amount_less_than_zero:
              arguments:
                group_by_column: fct_order_item_key
                col_id: order_year
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0  # (Optional)
              max_value: 1000 # (Optional)
              strictly: false # (Optional. Default is 'false'. Adds an 'or equal to' to the comparison operator for min/max)
      - name: line_extended_price
        data_tests:
          - not_null
      - name: line_discount
        data_tests:
          - not_null
      - name: line_tax
        data_tests:
          - not_null
      - name: part_retail_price
        data_tests:
          - not_null
      - name: part_available_quantity
        tests:
          - not_null
         # - dbt_expectations.expect_column_values_to_be_of_type:
         #     column_type: integer

