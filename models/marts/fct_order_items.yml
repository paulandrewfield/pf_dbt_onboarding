version: 2

models:
  - name: fct_order_items
    description: >
      Semantic model for order line items. Grain is one order item per row,
      identified by `FCT_ORDER_ITEM_KEY`.
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    columns:
      - name: line_quantity_ordered
        data_tests:
          - not_null
          - amount_less_than_zero:
              arguments:
                group_by_column: fct_order_item_key
                col_id: order_year
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1000
                strictly: false
      - name: line_extended_price
        data_tests:
          - not_null
      - name: line_discount
        data_tests:
          - not_null
      - name: line_tax
        data_tests:
          - not_null
      - name: part_retail_price
        data_tests:
          - not_null
      - name: part_available_quantity
        data_tests:
          - not_null
      - name: FCT_ORDER_ITEM_KEY
        entity:
          type: primary
          name: order_item
      - name: ORDER_DATE
        dimension:
          type: time
          name: order_date
        granularity: day
