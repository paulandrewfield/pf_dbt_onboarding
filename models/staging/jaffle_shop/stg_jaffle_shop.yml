models:
  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: Primary key for the orders table
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: Identifier for the customer who placed the order. Foreign key
        data_tests:
          - not_null
      - name: order_date
        description: The date when the order was placed
        data_tests:
          - not_null
      - name: order_status
        description: "{{ doc('order_status')}}"
        data_tests:
          - not_null
          - accepted_values:
              values:
                - completed
                - return_pending
                - placed
                - shipped
                - returned
  - name: stg_jaffle_shop__customers
    description: The grain of this table is one unique customer per row
    columns:
      - name: customer_id
        description: Primary key for the customers table
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer
        data_tests:
          - not_null